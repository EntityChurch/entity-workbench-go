# Canonical docs manifest for entity-workbench-go.
#
# Declares the *publishable* canonical doc surface so the content leaf can
# ingest these instead of hand-authoring prose about them. Absence is the
# honest default: only docs ready for public eyes are listed here. Everything
# else under docs/architecture/ (status snapshots, reviews, EXPLORATION-*,
# PROPOSAL-*, design notes, phase plans) is ephemeral and is scrubbed by the
# release builder's path/name patterns — intentionally not listed.
#
# Schema mirrors docs/release-readiness/CANONICAL-DOCS-FORMAT.md (meta).
# Paths are repo-relative (resolved against this manifest's location).

[project]
name   = "Entity Workbench (Go)"
slug   = "entity-workbench-go"
repo   = "entity-workbench-go"
github = "https://github.com/entity-systems/entity-workbench-go"
intro  = """
Entity Workbench (Go) is a reference application built on the Entity Core
Protocol — it sits at the bindings/apps layer of the ecosystem, above the Go
reference implementation (entity-core-go) and below nothing: nothing else
depends on it. It exists to show one coherent way to build an entity-native
application: a CLI (entity-shell), a TUI (entity-console), a desktop GUI
(Avalonia), a Go SDK (entitysdk) over the kernel, and a small CDN-corridor
toolset (entity-publish / entity-vcs / entity-fetch).

It is a *reference paradigm, not a mandate*. The protocol does not require any
of these shapes; the workbench is an opinionated demonstration, and the
documents below are the disciplines and patterns that demonstration holds
itself to — offered as a worked example, not a standard to conform to.
"""

